services:
  machine-1:
    build:
      context: .
      dockerfile: machine-1/Dockerfile
    container_name: machine-1
    networks:
      ha-network:
        ipv4_address: 10.10.2.10
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./machine-1/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./machine-1/nginx/html:/usr/share/nginx/html
      - ./machine-1/keepalive/keepalived.conf:/etc/keepalived/keepalived.conf:ro
      - ./machine-1/keepalive/check.sh:/etc/keepalived/check.sh:ro
    ports:
      - "8081:80"
    restart: unless-stopped

  machine-2:
    build:
      context: .
      dockerfile: machine-2/Dockerfile
    container_name: machine-2
    networks:
      ha-network:
        ipv4_address: 10.10.2.11
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./machine-2/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./machine-2/nginx/html:/usr/share/nginx/html
      - ./machine-2/keepalive/keepalived.conf:/etc/keepalived/keepalived.conf:ro
      - ./machine-2/keepalive/check.sh:/etc/keepalived/check.sh:ro
    ports:
      - "8082:80"
    restart: unless-stopped

networks:
  ha-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.2.0/24