vrrp_script check_web {
    script "/etc/keepalived/check.sh"
    interval 3
    weight -20
    fall 1
    rise 2
}

vrrp_instance VI_1 {
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    state BACKUP
    
    virtual_ipaddress {
        10.10.2.100/24
    }
    
    track_script {
        check_web
    }
}
